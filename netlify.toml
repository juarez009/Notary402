[build]
  command = "npm ci --include=dev --prefer-online --no-audit --no-fund && npm run build:web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  SECRETS_SCAN_OMIT_KEYS = "AMOY_CHAIN_ID,APERTURE_BASE_URL,DATAMCP_PERMISSION_PRESET,N8N_BASE_URL,NODE_ENV,NOTARY402_API_PORT,NOTARY402_MCP_PORT,NOTARY402_WEB_PORT,POLAR_NETWORK_NAME,QVAC_BASE_URL,QVAC_MODEL,VITE_NOTARY402_API_BASE_URL,ZAVU_DEFAULT_CHANNEL"
